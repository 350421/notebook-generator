<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>清新自然</title>
  <style>
    .theme-04 .note{background:radial-gradient(ellipse at 100% 0,rgba(87,132,97,.18),transparent 320px),linear-gradient(180deg,#F2F8F0,#E6F0E3)}
    .theme-04 .note::after{position:absolute;right:55px;top:48px;width:90px;height:120px;border:4px solid rgba(35,77,54,.12);border-width:0 4px 0 0;border-radius:50%;transform:rotate(32deg);content:""}
    .theme-04 .topbar{color:#48745A}
    .theme-04 .topbar::before{background:#9B7653}
    .theme-04 .block-list li::before{border-radius:10px;background:#DCE9D8}
    .theme-04 .block-quote{border-radius:0 16px 16px 0;background:rgba(255,255,255,.45)}
  </style>
</head>
<body class="theme-04">
  <main class="note">
    <div class="topbar">{{ header_label }}</div>
    <section class="markdown-content" data-render-slot="content"><div class="content-block"><h1 class="block-title">清新自然</h1></div></section>
    <footer class="footer"><span>{{ footer_subtitle }}</span><span class="page-number" data-render-slot="page-number">01</span></footer>
  </main>
</body>
</html>
