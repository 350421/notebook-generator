<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>杂志风</title>
  <style>
    .theme-10 .note{background:linear-gradient(90deg,#D94B3D 0,#D94B3D 30px,#FFF 30px,#FFF 100%)}
    .theme-10 .topbar{color:#111;letter-spacing:.3em}
    .theme-10 .topbar::before{width:70px;border-radius:0;background:#D94B3D}
    .theme-10 .block-title{max-width:870px;font-weight:900;letter-spacing:-.015em}
    .theme-10 .block-subtitle{min-height:72px;padding:10px 0 10px 94px;border-top:2px solid #111;border-bottom:1px solid #AAA;line-height:1.35}
    .theme-10 .block-subtitle::before{top:8px;bottom:8px;left:72px;width:8px;border-radius:0}
    .theme-10 .block-subtitle::after{top:50%;left:0;transform:translateY(-50%)}
    .theme-10 .block-list li::before{border-radius:0;background:#111;color:#FFF}
    .theme-10 .footer{padding-top:12px;border-top:1px solid #BBB;color:#777}
  </style>
</head>
<body class="theme-10">
  <main class="note">
    <div class="topbar">{{ header_label }}</div>
    <section class="markdown-content" data-render-slot="content"><div class="content-block"><h1 class="block-title">杂志风</h1></div></section>
    <footer class="footer"><span>{{ footer_subtitle }}</span><span class="page-number" data-render-slot="page-number">01</span></footer>
  </main>
</body>
</html>
